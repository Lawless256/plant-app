name: Deploy to GitHub Pages

# Build + publish on every push to main, or when manually triggered.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions needed by the official Pages deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one in-flight deploy at a time; queue but don't cancel.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        # The Plant.id key is read from a GitHub Actions secret named
        # PLANTID_API_KEY and exposed to Vite as VITE_PLANTID_API_KEY at
        # build time. Add it under: Settings → Secrets and variables →
        # Actions → New repository secret.
        env:
          VITE_PLANTID_API_KEY: ${{ secrets.PLANTID_API_KEY }}
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
